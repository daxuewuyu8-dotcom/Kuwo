name: Auto Build Intelligent Script

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动更新
  workflow_dispatch:       # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Build final script
        run: cat scripts/base.js > dist/final.js

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add dist/final.js
          git commit -m "auto build final.js" || echo "no changes"
          git push